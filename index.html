<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>테트리스</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="game-container">
    <h1>테트리스</h1>

    <div class="game-layout">
      <div class="board-wrapper">
        <div id="game-board" class="board" aria-label="테트리스 게임 보드"></div>
        <p id="game-status" class="game-status hidden" role="status" aria-live="polite">
          게임 오버
        </p>
      </div>

      <aside class="side-panel">
        <section class="score-panel">
          <h2>점수</h2>
          <p id="score" class="score-value">0</p>
        </section>

        <section class="controls-panel">
          <button type="button" id="start-btn">시작</button>
          <button type="button" id="restart-btn">재시작</button>
        </section>

        <section class="help-panel">
          <h2>조작법</h2>
          <ul>
            <li><kbd>←</kbd> <kbd>→</kbd> : 왼쪽 / 오른쪽 이동</li>
            <li><kbd>↓</kbd> : 한 칸 빠르게 내리기</li>
            <li><kbd>↑</kbd> : 블록 회전</li>
            <li><kbd>Space</kbd> : 즉시 바닥까지 낙하</li>
          </ul>
        </section>
      </aside>
    </div>
  </main>

  <script type="module" src="script.js"></script>
</body>
</html>
